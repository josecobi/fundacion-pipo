          - heading "¿Quién fue Pipo Navarro?" [level=2] [ref=e348]
          - paragraph [ref=e349]: Trompetista, maestro y compositor panameño (1921–1981)
        - generic [ref=e350]:
          - generic [ref=e351]:
            - paragraph [ref=e352]: Este meritorio hijo de Panamá nació en la ciudad de Panamá el 2 de diciembre de 1921. Fue hijo de don Ezequiel Navarro y doña Laura Flores de Navarro.
            - paragraph [ref=e353]: Su primer acercamiento a la música ocurrió en la banda del Colegio Don Bosco, institución salesiana en la que cursó sus estudios y donde aprendió a tocar el redoblante. Más adelante ingresó al Conservatorio Nacional, del que se graduó en 1941, guiado por maestros como José Luis Cajar, con quien inició sus estudios de trompeta, así como Cleveland Reynolds, Rebeca de Vergel y Hans Janowits, entre otros.
            - paragraph [ref=e354]: Apenas obtuvo su título en el Conservatorio Nacional, se integró a la vida profesional como músico de la Orquesta Continental de Palito Hayes. Poco después formó su propia agrupación, la Orquesta Imperial de Pipo Navarro, así como el Conjunto Estrellas Panameñas de Pipo Navarro, donde brilló como director, arreglista y compositor.
            - paragraph [ref=e355]: Durante su juventud, mientras estudiaba en el Colegio Don Bosco, su contextura delgada cambió con el tiempo, y de manera cariñosa comenzaron a llamarlo "Pipo", apodo con el que sería recordado por siempre. Contrajo matrimonio con la señora Benigna María Barría, oriunda de la provincia de Chiriquí, con quien formó su familia y tuvo a sus hijos Deyka Ruth y Ezequiel.
            - paragraph [ref=e356]: Su trayectoria también lo llevó a Centroamérica y México, país en el que residió durante dos años mientras ejercía su profesión y enriquecía su formación al intercambiar conocimientos con el reconocido maestro panameño Roque Cordero.
            - paragraph [ref=e357]: Dotado de una profunda vocación por la enseñanza, el maestro Pipo Navarro dedicó buena parte de su vida a formar nuevas generaciones de músicos. Enseñó en el Departamento de Música de la Universidad de Panamá, dirigió la Escuela Nacional de Música —donde también impartió la materia de Estructuración Musical—, fue miembro de la Orquesta Sinfónica de Panamá y profesor de la Escuela Elena Ch. de Pinate, donde además fundó la banda musical de este reconocido plantel secundario.
            - paragraph [ref=e358]: Entre sus más destacadas ejecutorias figuran la organización y dirección de la Orquesta del Hotel El Panamá, donde trabajó por más de diez años; la dirección del Primer Festival Latinoamericano; su participación en la dirección del Festival OTI, en el que obtuvo importantes reconocimientos; y su labor como director de la Banda de Bomberos de La Chorrera.
            - paragraph [ref=e359]: El profesor Ezequiel A. Navarro Flores dejó un legado invaluable en la música panameña. Entre sus mayores aportes se encuentra la formación de músicos de gran prestigio nacional, como el maestro Luis Efraín "Pin" Castro y Jaime Lombardo, así como memorables arreglos musicales, entre ellos "Amando Soy Feliz", interpretada por los Hermanos Rigual; "Basta de Soñar", del autor Pepe Zamora; y "Navidad", de su propia autoría. Del mismo modo, compartió escenarios con artistas de la talla de Olga Guillot, Celia Cruz, Willie Colón y Pellín Rodríguez, del Gran Combo.
            - paragraph [ref=e360]: Pipo partió de la vida terrenal el 4 de noviembre de 1981, dejando tras de sí una huella luminosa en la cultura panameña. Su memoria permanece viva en su música, en sus discípulos y en el cariño de quienes lo recuerdan como un hombre siempre sonriente, generoso y profundamente entregado a su arte.
          - generic [ref=e361]:
            - generic [ref=e364]: Origen de la Fundación
            - generic [ref=e366]:
              - paragraph [ref=e367]: La Fundación Pipo Navarro surge como una iniciativa de sus hijos, Deyka y Ezequiel, junto con Moisés Véliz Arosemena, con el propósito de dar continuidad al legado del maestro Ezequiel A. Navarro Flores, orientando y motivando a jóvenes estudiantes en el aprendizaje y la ejecución de instrumentos musicales.
              - paragraph [ref=e368]: La Fundación fue constituida mediante la Escritura Pública No. 23,841, de fecha 25 de noviembre de 2011, y su Reglamento Fundacional quedó establecido mediante la Escritura Pública No. 24,392, de fecha 5 de diciembre de 2011.
              - paragraph [ref=e369]: Se trata de una organización de interés privado con sede en la República de Panamá, cuyas actuaciones son dirigidas por un Consejo de Fundación.
          - generic [ref=e370]:
            - generic [ref=e371]:
              - generic [ref=e372]:
                - img [ref=e374]
                - heading "Misión" [level=3] [ref=e376]
              - paragraph [ref=e377]: La Fundación Pipo Navarro está comprometida con promover la democratización y el acceso a la educación musical, con énfasis en niños y adolescentes en condición de vulnerabilidad en la República de Panamá.
            - generic [ref=e378]:
              - generic [ref=e379]:
                - img [ref=e381]
                - heading "Visión" [level=3] [ref=e384]
              - paragraph [ref=e385]: Consolidarse como una organización referente en la promoción de la educación musical en Panamá, facilitando el acceso a instrumentos musicales y articulando esfuerzos con entidades del sector público y privado para impulsar la formación de músicos y agrupaciones musicales que enaltezcan el nombre del país.
